<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choisir le mode de jeu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .mode-selection {
            text-align: center;
            margin-top: 50px;
        }

        .mode-selection h1 {
            color: #FFD700;
            font-size: 36px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .mode-card {
            background-color: rgba(0, 51, 102, 0.7);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }

        .mode-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .mode-card h2 {
            color: #FFD700;
            margin-top: 0;
        }

        .mode-card p {
            color: #ffffff;
            margin-bottom: 20px;
        }

        .mode-button {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            margin: 10px auto;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .mode-button:hover {
            background-color: #45a049;
            transform: translateY(-3px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="mode-selection">
        <h1>Le jeu des images</h1>
        <div class="mode-grid">
            {% for mode in modes %}
            <div class="mode-card">
                <h2>{{ mode.name|capitalize }}</h2>
                <p>{{ mode.description }}</p>
                <a href="{{ url_for('game.start_mode', mode_name=mode.name) }}" class="mode-button">Jouer</a>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Subtle hint for the Konami code easter egg -->
    <div style="position: fixed; bottom: 10px; right: 10px; font-size: 12px; color: rgba(255, 215, 0, 0.5); cursor: default;">
        ↑↑↓↓←→←→BA
    </div>
</body>
</html>
