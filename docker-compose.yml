services:
  app:
    build: .
    # Run as the host user so files written to the mounted ./data and ./uploads
    # volumes (scores.json, uploaded CSVs, photos) stay owned by the developer
    # and don't break `make run` / pytest after a container run.
    # Override with `UID`/`GID` env vars if your host uses different ids.
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
      - ./uploads:/app/uploads
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
